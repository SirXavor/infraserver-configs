---
kind: base
name: automation

match:
  distro: rhel

kickstart:
  post:
    - |
      set -euo pipefail

      dnf install -y git ansible-core curl python3 ca-certificates

    - |
      set -euo pipefail


      export LANG=C.UTF-8
      export LC_ALL=C.UTF-8
      mkdir -p /usr/share/ansible/collections
      ansible-galaxy collection install ansible.posix -p /usr/share/ansible/collections

    - |
      set -euo pipefail

      mkdir -p /etc/infraserver /var/log/infraserver
      cat > /etc/infraserver/bootstrap.env << "EOF"
      DS_URL="{{ ds_url }}"
      CFG_DIR="/etc/infraserver"
      REPO_URL="{{ repo_url }}"
      REPO_DIR="/opt/InfraServer"
      EOF
      chmod 600 /etc/infraserver/bootstrap.env

    - |
      set -euo pipefail

      source /etc/infraserver/bootstrap.env
      if [ ! -d "$REPO_DIR/.git" ]; then
        git clone --recurse-submodules "$REPO_URL" "$REPO_DIR"
      else
        git -C "$REPO_DIR" submodule update --init --recursive
      fi

    - |
      cat > /usr/local/sbin/ansible-repo-sync.sh << "EOF"
      #!/bin/bash
      set -euo pipefail

      source /etc/infraserver/bootstrap.env

      LOG_FILE="/var/log/infraserver/repo-sync.log"
      exec >>"$LOG_FILE" 2>&1

      echo "===== $(date) :: inicio repo-sync ====="

      if [ ! -d "$REPO_DIR/.git" ]; then
        git clone --recurse-submodules "$REPO_URL" "$REPO_DIR"
      else
        git -C "$REPO_DIR" pull --ff-only
        git -C "$REPO_DIR" submodule update --remote --merge
      fi

      echo "===== $(date) :: fin repo-sync ====="
      EOF
      chmod 755 /usr/local/sbin/ansible-repo-sync.sh

    - |
      cat > /usr/local/sbin/ansible-apply.sh << "EOF"
      #!/bin/bash
      set -euo pipefail

      source /etc/infraserver/bootstrap.env

      LOG_FILE="/var/log/infraserver/apply.log"
      exec >>"$LOG_FILE" 2>&1

      echo "===== $(date) :: inicio apply ====="

      mkdir -p "$CFG_DIR"

      MAC=$(ip link show | awk "/link\\/ether/ {print \$2; exit}" | tr ":" "-")
      curl -fsSL "${DS_URL}/ds/${MAC}/ansible" -o "$CFG_DIR/ansible.yml"

      cd "$REPO_DIR/configs/ansible"
      ansible-playbook -i localhost, -c local playbooks/bootstrap.yaml -e @"$CFG_DIR/ansible.yml"

      echo "===== $(date) :: fin apply ====="
      EOF
      chmod 755 /usr/local/sbin/ansible-apply.sh

    - |
      cat > /usr/local/sbin/ansible-sync.sh << "EOF"
      #!/bin/bash
      set -euo pipefail

      /usr/local/sbin/ansible-repo-sync.sh
      /usr/local/sbin/ansible-apply.sh
      EOF
      chmod 755 /usr/local/sbin/ansible-sync.sh

    - |
      cat > /etc/systemd/system/ansible-sync.service << "EOF"
      [Unit]
      Description=InfraServer Ansible Sync
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/ansible-sync.sh
      EOF

    - |
      cat > /etc/systemd/system/ansible-sync.timer << "EOF"
      [Unit]
      Description=Run InfraServer Ansible Sync periodically

      [Timer]
      OnBootSec=2min
      OnUnitActiveSec=1h
      Persistent=true

      [Install]
      WantedBy=timers.target
      EOF

    - |
      systemctl daemon-reload
      systemctl enable ansible-sync.timer