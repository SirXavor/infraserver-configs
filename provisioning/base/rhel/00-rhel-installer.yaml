---
kind: base
name: installer

match:
  distro: rhel

kickstart:
  lang: es_ES.UTF-8
  keyboard: es
  timezone: Europe/Madrid --utc
  reboot: true

  root:
    lock: true

  user:
    name: xavor
    password: '$6$q7TEWg0Pi4Nayu3c$Ix0MYhRuNzksBAytU1C/cvB4ou5tLHbm5xHRzo9/zwcOKV25WC7UnCmznD9pYqOAh0nW68tB6RAgT5uXAJlHA.'
    groups:
      - wheel

  ssh:
    enabled: true
    authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMq6aqrnd9i5mvcWsB5KiJVXSxn2FAjcimHac6lCdNZs Movil
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICMdSPnfzS2L6RdbZl9Tc/mdjMucVt03Z+JeY/Uhb5mV Casa
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKO0+q6IUDE9KZap5XW4QjpF3V0BkjSwtIHocqAXihSG Portatil-Aux
    password_auth: false

  packages:
    - "@^minimal-environment"
    - python3
    - openssh-server
    - curl
    - vim
    - sudo
    - ca-certificates
    - git

  post:
    - |
      set -euo pipefail

      IFACE="$(ip route show default | awk '/default/ {print $5}' | head -1)"
      if [ -n "$IFACE" ] && [ -e "/sys/class/net/$IFACE/address" ]; then
        MAC="$(tr ':' '-' < /sys/class/net/$IFACE/address)"
        mkdir -p /etc/infraserver
        printf '%s\n' \
          "DS_URL=http://192.168.1.70:8081" \
          "CFG_DIR=/etc/infraserver" \
          > /etc/infraserver/runtime.env
      fi

    - |
      set -euo pipefail

      mkdir -p /etc/yum.repos.d

      cat > /etc/yum.repos.d/infraserver-local.repo << "EOF"
      [infraserver-baseos]
      name=InfraServer BaseOS
      baseurl=http://192.168.1.70:8081/content/repos/rhel/9/BaseOS/
      enabled=1
      gpgcheck=0

      [infraserver-appstream]
      name=InfraServer AppStream
      baseurl=http://192.168.1.70:8081/content/repos/rhel/9/AppStream/
      enabled=1
      gpgcheck=0
      EOF

      dnf clean all
      dnf makecache

