kind: base
name: installer

match:
  distro: ubuntu

autoinstall:
  version: 1
  locale: es_ES.UTF-8

  keyboard:
    layout: es

  identity:
    hostname: ubuntu-server
    username: xavor
    password: '$6$q7TEWg0Pi4Nayu3c$Ix0MYhRuNzksBAytU1C/cvB4ou5tLHbm5xHRzo9/zwcOKV25WC7UnCmznD9pYqOAh0nW68tB6RAgT5uXAJlHA.'

  ssh:
    install-server: true
    authorized-keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMq6aqrnd9i5mvcWsB5KiJVXSxn2FAjcimHac6lCdNZs Movil
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICMdSPnfzS2L6RdbZl9Tc/mdjMucVt03Z+JeY/Uhb5mV Casa
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKO0+q6IUDE9KZap5XW4QjpF3V0BkjSwtIHocqAXihSG  Portatil-Aux

    allow-pw: false

  packages:
    - python3
    - python3-apt
    - openssh-server
    - curl
    - vim
    - sudo
    - ca-certificates
    - git

  late-commands:
    - |
      IFACE="$(ip route show default | awk '/default/ {print $5}' | head -1)"
      if [ -n "$IFACE" ] && [ -e "/sys/class/net/$IFACE/address" ]; then
        MAC="$(tr ':' '-' < /sys/class/net/$IFACE/address)"
        mkdir -p /target/etc/cloud/cloud.cfg.d
        printf '%s\n' \
          'datasource_list: [NoCloud]' \
          'datasource:' \
          '  NoCloud:' \
          "    seedfrom: http://boot.local/ds/${MAC}/" \
          > /target/etc/cloud/cloud.cfg.d/99-datasource.cfg
      fi

    - curtin in-target --target=/target -- apt-get update || true

    - |
      curtin in-target --target=/target -- bash -c '
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y ansible
      '

  user-data:
    timezone: Europe/Madrid
    package_update: true
    package_upgrade: false
