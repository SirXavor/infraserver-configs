apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ingress-nginx.yaml
  - metallb/

helmCharts:
  - name: argo-cd
    repo: https://argoproj.github.io/argo-helm
    version: 8.0.0
    releaseName: argocd
    namespace: argocd
    valuesFile: argo-values.yaml
    includeCRDs: true
