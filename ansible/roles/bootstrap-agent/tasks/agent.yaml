---
- name: Crear directorio de logs de InfraServer
  file:
    path: /var/log/infraserver
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Instalar script de sincronización de repositorio
  copy:
    dest: /usr/local/sbin/ansible-repo-sync.sh
    owner: root
    group: root
    mode: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail

      source /etc/infraserver/bootstrap.env

      LOG_FILE="/var/log/infraserver/repo-sync.log"
      REPO_URL="{{ automation.repo.url }}"
      REPO_DIR="{{ automation.repo.local_path | default('/opt/InfraServer') }}"
      REPO_BRANCH="{{ automation.repo.branch | default('main') }}"

      exec >>"$LOG_FILE" 2>&1

      echo "===== $(date) :: inicio repo-sync ====="

      if [ ! -d "$REPO_DIR/.git" ]; then
        mkdir -p "$(dirname "$REPO_DIR")"
        git clone -b "$REPO_BRANCH" "$REPO_URL" "$REPO_DIR"
      else
        git -C "$REPO_DIR" fetch --all --prune
        git -C "$REPO_DIR" checkout "$REPO_BRANCH"
        git -C "$REPO_DIR" pull --ff-only origin "$REPO_BRANCH"
      fi

      echo "===== $(date) :: fin repo-sync ====="

- name: Instalar script de ejecución de Ansible
  copy:
    dest: /usr/local/sbin/ansible-apply.sh
    owner: root
    group: root
    mode: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail

      source /etc/infraserver/bootstrap.env

      LOG_FILE="/var/log/infraserver/apply.log"
      REPO_DIR="{{ automation.repo.local_path | default('/opt/InfraServer') }}"
      PLAYBOOK="{{ automation.apply.playbook | default('playbooks/bootstrap.yaml') }}"

      exec >>"$LOG_FILE" 2>&1

      echo "===== $(date) :: inicio apply ====="

      mkdir -p "$CFG_DIR"

      MAC=$(ip link show | awk '/link\/ether/ {print $2; exit}' | tr ':' '-')
      curl -fsSL "${DS_URL}/ds/${MAC}/ansible" -o "$CFG_DIR/ansible.yml"

      cd "$REPO_DIR/configs/ansible"
      ansible-playbook -i localhost, -c local "$PLAYBOOK" -e @"$CFG_DIR/ansible.yml"

      echo "===== $(date) :: fin apply ====="

- name: Instalar wrapper ansible-sync
  copy:
    dest: /usr/local/sbin/ansible-sync.sh
    owner: root
    group: root
    mode: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail

      /usr/local/sbin/ansible-repo-sync.sh
      /usr/local/sbin/ansible-apply.sh

- name: Instalar servicio systemd ansible-sync
  copy:
    dest: /etc/systemd/system/ansible-sync.service
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=InfraServer Ansible Sync
      Wants=network-online.target
      After=network-online.target

      [Service]
      Type=oneshot
      ExecStart=/usr/local/sbin/ansible-sync.sh

- name: Instalar timer systemd ansible-sync
  copy:
    dest: /etc/systemd/system/ansible-sync.timer
    owner: root
    group: root
    mode: '0644'
    content: |
      [Unit]
      Description=Run InfraServer Ansible Sync periodically

      [Timer]
      OnBootSec=2min
      OnUnitActiveSec={{ automation.apply.interval | default('1h') }}
      Persistent=true

      [Install]
      WantedBy=timers.target

- name: Recargar systemd
  systemd:
    daemon_reload: true

- name: Habilitar y arrancar timer ansible-sync
  systemd:
    name: ansible-sync.timer
    enabled: true
    state: started