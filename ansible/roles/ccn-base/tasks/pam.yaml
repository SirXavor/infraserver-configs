---
# Hardening PAM para Ubuntu
# - Bloqueo por intentos fallidos (pam_faillock)
# - Política de calidad de contraseña (pam_pwquality)
# - Historial de contraseñas
# - Bloqueo de root
# - Timeout de sesión shell

- name: Instalar paquetes necesarios para PAM hardening
  apt:
    name:
      - libpam-modules
      - libpam-modules-bin
      - libpam-pwquality
    state: present
    update_cache: true

- name: Asegurar existencia de /etc/security/faillock.conf
  file:
    path: /etc/security/faillock.conf
    state: touch
    owner: root
    group: root
    mode: "0644"

- name: Configurar /etc/security/faillock.conf
  copy:
    dest: /etc/security/faillock.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    content: |
      # Managed by Ansible - CCN/PAM hardening
      deny = {{ pam_faillock_deny | default(5) }}
      fail_interval = {{ pam_faillock_fail_interval | default(900) }}
      unlock_time = {{ pam_faillock_unlock_time | default(600) }}
      admin_group = {{ pam_faillock_admin_group | default('sudo') }}

# -------------------------------------------------
# PAM FAILLOCK - common-auth
# -------------------------------------------------

- name: Eliminar referencias antiguas a pam_faillock en common-auth
  lineinfile:
    path: /etc/pam.d/common-auth
    regexp: 'pam_faillock\.so'
    state: absent
    backup: true

- name: Asegurar línea pam_unix base en common-auth
  lineinfile:
    path: /etc/pam.d/common-auth
    regexp: '^auth\s+\[success=1 default=ignore\]\s+pam_unix\.so.*'
    line: 'auth    [success=1 default=ignore]      pam_unix.so nullok'
    backup: true

- name: Añadir pam_faillock preauth antes de pam_unix
  lineinfile:
    path: /etc/pam.d/common-auth
    insertbefore: '^auth\s+\[success=1 default=ignore\]\s+pam_unix\.so'
    line: 'auth    required                        pam_faillock.so preauth silent audit'
    backup: true

- name: Añadir pam_faillock authfail después de pam_unix
  lineinfile:
    path: /etc/pam.d/common-auth
    insertafter: '^auth\s+\[success=1 default=ignore\]\s+pam_unix\.so'
    line: 'auth    [default=die]                   pam_faillock.so authfail audit'
    backup: true

- name: Añadir pam_faillock authsucc después de authfail
  lineinfile:
    path: /etc/pam.d/common-auth
    insertafter: '^auth\s+\[default=die\]\s+pam_faillock\.so authfail audit'
    line: 'auth    sufficient                      pam_faillock.so authsucc audit'
    backup: true

# -------------------------------------------------
# PAM FAILLOCK - common-account
# -------------------------------------------------

- name: Eliminar referencias antiguas a pam_faillock en common-account
  lineinfile:
    path: /etc/pam.d/common-account
    regexp: 'pam_faillock\.so'
    state: absent
    backup: true

- name: Añadir pam_faillock en common-account antes de pam_unix
  lineinfile:
    path: /etc/pam.d/common-account
    insertbefore: '^account\s+\[success=1 new_authtok_reqd=done default=ignore\]\s+pam_unix\.so'
    line: 'account required                        pam_faillock.so'
    backup: true

# -------------------------------------------------
# PWQUALITY
# -------------------------------------------------

- name: Configurar calidad de contraseñas en /etc/security/pwquality.conf
  copy:
    dest: /etc/security/pwquality.conf
    owner: root
    group: root
    mode: "0644"
    backup: true
    content: |
      # Managed by Ansible - CCN/PAM hardening
      minlen = {{ pam_pwquality_minlen | default(10) }}
      dcredit = {{ pam_pwquality_dcredit | default(-1) }}
      ucredit = {{ pam_pwquality_ucredit | default(-1) }}
      lcredit = {{ pam_pwquality_lcredit | default(-1) }}
      ocredit = {{ pam_pwquality_ocredit | default(-1) }}
      difok = {{ pam_pwquality_difok | default(4) }}
      maxrepeat = {{ pam_pwquality_maxrepeat | default(3) }}
      gecoscheck = {{ pam_pwquality_gecoscheck | default(1) }}
      enforce_for_root

- name: Asegurar pam_pwquality en common-password
  lineinfile:
    path: /etc/pam.d/common-password
    regexp: '^password\s+requisite\s+pam_pwquality\.so'
    line: 'password requisite pam_pwquality.so retry=3'
    insertbefore: '^password\s+\[success=1 default=ignore\]\s+pam_unix\.so'
    backup: true

- name: Configurar historial de contraseñas en common-password (pam_unix)
  replace:
    path: /etc/pam.d/common-password
    regexp: '^(password\s+\[success=1 default=ignore\]\s+pam_unix\.so\s+)(.*)$'
    replace: '\1obscure use_authtok try_first_pass yescrypt remember={{ pam_password_remember | default(5) }}'
    backup: true

# -------------------------------------------------
# LOGIN.DEFS
# -------------------------------------------------

- name: Configurar PASS_MAX_DAYS en /etc/login.defs
  lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MAX_DAYS'
    line: 'PASS_MAX_DAYS   {{ pam_pass_max_days | default(60) }}'
    backup: true

- name: Configurar PASS_MIN_DAYS en /etc/login.defs
  lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_MIN_DAYS'
    line: 'PASS_MIN_DAYS   {{ pam_pass_min_days | default(2) }}'
    backup: true

- name: Configurar PASS_WARN_AGE en /etc/login.defs
  lineinfile:
    path: /etc/login.defs
    regexp: '^PASS_WARN_AGE'
    line: 'PASS_WARN_AGE   {{ pam_pass_warn_age | default(12) }}'
    backup: true

- name: Aplicar envejecimiento de contraseña a usuarios locales >=1000
  shell: |
    set -e
    awk -F: '$3 >= 1000 && $1 != "nobody" {print $1}' /etc/passwd | while read -r u; do
      chage -m {{ pam_pass_min_days | default(2) }} \
            -M {{ pam_pass_user_max_days | default(730) }} \
            -W {{ pam_pass_warn_age | default(12) }} "$u" || true
    done
  args:
    executable: /bin/bash
  changed_when: false

# -------------------------------------------------
# ROOT / TIMEOUT
# -------------------------------------------------

- name: Bloquear cuenta root
  command: passwd -l root
  register: pam_root_lock
  changed_when: "'password changed' in (pam_root_lock.stdout | lower) or 'password changed' in (pam_root_lock.stderr | lower)"
  failed_when: false

- name: Crear timeout de shell por inactividad
  copy:
    dest: /etc/profile.d/timeout.sh
    owner: root
    group: root
    mode: "0644"
    backup: true
    content: |
      TMOUT={{ pam_shell_timeout | default(600) }}
      readonly TMOUT
      export TMOUT

# -------------------------------------------------
# RESET FAILLOCK
# -------------------------------------------------

- name: Resetear bloqueos faillock existentes
  command: faillock --reset
  changed_when: false
  failed_when: false